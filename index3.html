<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - JavaScript</title>
    <link rel="stylesheet" type="text/css" href="estiloaula.css">
</head> 
<body>










    <script>
        let num1 = parseFloat(prompt('Digite um numero 01: '));
        document.write(`<p> Numero 01: ${num1} </p>`);

        let num2 = parseFloat(prompt('Digite um numero 02: '));
        document.write(`<p> Numero 02: ${num2} </p>`);

        let soma = num1 + num2;
        let sub = num1 - num2;
        let divisao = num1/num2;


        document.write(`<p style="color: cyan; background-color:black;"> A soma é: ${soma} </p>`);
        document.write(`<p class="nada-a-ver"> A subtracao é: ${sub} </p>`);
        document.write(`<p class="nada-a-ver"> A divisao é: ${divisao} </p>`);


    </script>
</body>
</html>
